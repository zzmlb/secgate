<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway - 访问验证</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0e27;
            color: #e4e7f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: linear-gradient(145deg, #1a1f45, #131736);
            border: 1px solid #2a3065;
            border-radius: 20px;
            padding: 48px 40px;
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #4fc3f7, #ab47bc);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px rgba(79,195,247,0.3);
        }
        h1 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #4fc3f7, #26c6da);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #8892b0;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 13px;
            color: #8892b0;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #2a3065;
            border-radius: 10px;
            color: #e4e7f5;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79,195,247,0.15);
        }
        input[type="text"]::placeholder { color: #4a5070; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4fc3f7, #26c6da);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79,195,247,0.4);
        }
        .error-msg {
            background: rgba(239,83,80,0.12);
            border: 1px solid rgba(239,83,80,0.3);
            color: #ef5350;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }
        .footer-text {
            text-align: center;
            color: #4a5070;
            font-size: 12px;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">&#128274;</div>
        <h1>Gateway</h1>
        <div class="subtitle">请输入访问令牌以继续</div>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/auth/do-login">
            <input type="hidden" name="next" value="{{ next_url }}">
            <div class="form-group">
                <label>Access Token</label>
                <input type="text" name="token" placeholder="请输入或粘贴 Token..." autofocus autocomplete="off">
            </div>
            <button type="submit" class="btn-submit">验证并进入</button>
        </form>
        <div class="footer-text">Gateway Authentication System</div>
    </div>
</body>
</html>
