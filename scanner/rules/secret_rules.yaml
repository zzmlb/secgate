# 敏感数据泄露检测规则
# 格式说明:
#   name: 规则名称
#   pattern: 正则表达式（字符串形式）
#   severity: 严重等级 (CRITICAL|HIGH|MEDIUM|LOW)
#   category: 分类
#   description: 描述
#   remediation: 修复建议
#   case_insensitive: 是否忽略大小写（可选，默认 false）
#   entropy_check: 是否启用熵值检测（可选，默认 false）

# ========== 原有 11 条规则 ==========

- name: "MongoDB URI（含密码）"
  pattern: "mongodb(?:\\+srv)?://[^:]+:[^@]+@[^\\s'\"]+"
  severity: "CRITICAL"
  category: "数据库凭据泄露"
  description: "发现包含用户名和密码的 MongoDB 连接字符串"
  remediation: "将 MongoDB URI 移至环境变量或密钥管理服务中，不要在代码中硬编码"

- name: "OpenAI API Key"
  pattern: "sk-[a-zA-Z0-9]{32,}"
  severity: "CRITICAL"
  category: "API 密钥泄露"
  description: "发现疑似 OpenAI API 密钥（sk- 开头）"
  remediation: "立即轮换该 API 密钥，并将其移至环境变量中"

- name: "AWS Access Key"
  pattern: "AKIA[0-9A-Z]{16}"
  severity: "CRITICAL"
  category: "API 密钥泄露"
  description: "发现疑似 AWS Access Key ID（AKIA 开头）"
  remediation: "立即轮换该 AWS 密钥，使用 IAM 角色或密钥管理服务替代硬编码"

- name: "AWS Secret Key"
  pattern: "(?:aws_secret_access_key|AWS_SECRET_ACCESS_KEY)\\s*[=:]\\s*['\"]?([a-zA-Z0-9/+=]{40})['\"]?"
  severity: "CRITICAL"
  category: "API 密钥泄露"
  description: "发现疑似 AWS Secret Access Key"
  remediation: "立即轮换该 AWS 密钥，使用 IAM 角色或密钥管理服务替代硬编码"

- name: "GitHub Token"
  pattern: "(?:ghp|gho|ghu|ghs|ghr)_[a-zA-Z0-9]{36,}"
  severity: "HIGH"
  category: "API 密钥泄露"
  description: "发现疑似 GitHub Personal Access Token"
  remediation: "立即撤销该 Token，使用 GitHub App 或环境变量管理凭据"

- name: "通用密码赋值"
  pattern: "(?:password|passwd|pwd|secret|token|api_key|apikey|access_key|private_key)\\s*[=:]\\s*['\"][^'\"]{4,}['\"]"
  severity: "HIGH"
  category: "硬编码密码"
  description: "发现硬编码的密码/密钥/Token 赋值"
  remediation: "将敏感值移至环境变量、.env 文件（需加入 .gitignore）或密钥管理服务"
  case_insensitive: true

- name: "JWT / Bearer Token"
  pattern: "(?:Bearer\\s+)?eyJ[a-zA-Z0-9_\\-]+\\.eyJ[a-zA-Z0-9_\\-]+\\.[a-zA-Z0-9_\\-]+"
  severity: "HIGH"
  category: "Token 泄露"
  description: "发现硬编码的 JWT Token"
  remediation: "移除硬编码的 JWT，Token 应通过认证流程动态获取"

- name: "RSA / SSH 私钥"
  pattern: "-----BEGIN\\s+(?:RSA\\s+)?PRIVATE\\s+KEY-----"
  severity: "CRITICAL"
  category: "私钥泄露"
  description: "发现硬编码的 RSA/SSH 私钥"
  remediation: "私钥不应存储在代码仓库中，请使用密钥管理服务或加密存储"

- name: "硬编码 IP 数据库连接"
  pattern: "(?:mysql|postgresql|postgres|redis|mongo)(?:ql)?://[^@]*@(?:\\d{1,3}\\.){3}\\d{1,3}:\\d+"
  severity: "MEDIUM"
  category: "硬编码连接信息"
  description: "发现包含硬编码 IP 地址的数据库连接字符串"
  remediation: "将数据库连接信息移至环境变量或配置文件中"
  case_insensitive: true

- name: "Slack Webhook"
  pattern: "https://hooks\\.slack\\.com/services/T[a-zA-Z0-9_]+/B[a-zA-Z0-9_]+/[a-zA-Z0-9_]+"
  severity: "MEDIUM"
  category: "Webhook 泄露"
  description: "发现 Slack Webhook URL"
  remediation: "轮换该 Webhook URL，并将其存储在环境变量中"

- name: "通用 Secret（高熵值字符串）"
  pattern: "(?:SECRET|KEY|TOKEN|PASS)\\s*[=:]\\s*['\"]([a-zA-Z0-9+/=_\\-]{20,})['\"]"
  severity: "MEDIUM"
  category: "疑似密钥"
  description: "发现疑似高熵值密钥字符串"
  remediation: "确认该值是否为敏感信息，如是，请移至安全存储"
  case_insensitive: true
  entropy_check: true

# ========== 新增 14 条规则 ==========

- name: "Google API Key"
  pattern: "AIza[0-9A-Za-z\\-_]{35}"
  severity: "HIGH"
  category: "API 密钥泄露"
  description: "发现疑似 Google API Key（AIza 开头）"
  remediation: "立即在 Google Cloud Console 中轮换该 API Key，并限制其使用范围"

- name: "Google OAuth ID"
  pattern: "[0-9]+-[0-9A-Za-z_]{32}\\.apps\\.googleusercontent\\.com"
  severity: "MEDIUM"
  category: "OAuth 凭据泄露"
  description: "发现 Google OAuth Client ID"
  remediation: "OAuth Client ID 不应硬编码在代码中，请移至环境变量或配置服务"

- name: "Azure Storage Key"
  pattern: "DefaultEndpointsProtocol=https;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{86,88}"
  severity: "CRITICAL"
  category: "云存储凭据泄露"
  description: "发现 Azure Storage 连接字符串（含 AccountKey）"
  remediation: "立即轮换该 Storage Key，使用 Azure Key Vault 或托管身份替代硬编码"

- name: "Stripe Live Secret Key"
  pattern: "sk_live_[0-9a-zA-Z]{24,}"
  severity: "CRITICAL"
  category: "支付密钥泄露"
  description: "发现 Stripe 生产环境 Secret Key"
  remediation: "立即在 Stripe Dashboard 中轮换该密钥，使用环境变量管理"

- name: "Stripe Live Publishable Key"
  pattern: "pk_live_[0-9a-zA-Z]{24,}"
  severity: "MEDIUM"
  category: "支付密钥泄露"
  description: "发现 Stripe 生产环境 Publishable Key"
  remediation: "虽然 Publishable Key 可以公开，但建议从环境变量加载，避免硬编码"

- name: "Twilio API Key"
  pattern: "SK[0-9a-fA-F]{32}"
  severity: "HIGH"
  category: "API 密钥泄露"
  description: "发现疑似 Twilio API Key（SK 开头 + 32位十六进制）"
  remediation: "立即在 Twilio Console 中轮换该 API Key，使用环境变量管理"

- name: "SendGrid API Key"
  pattern: "SG\\.[a-zA-Z0-9_-]{22}\\.[a-zA-Z0-9_-]{43}"
  severity: "HIGH"
  category: "API 密钥泄露"
  description: "发现疑似 SendGrid API Key"
  remediation: "立即在 SendGrid 中轮换该 API Key，使用环境变量管理"

- name: "Mailgun API Key"
  pattern: "key-[0-9a-zA-Z]{32}"
  severity: "HIGH"
  category: "API 密钥泄露"
  description: "发现疑似 Mailgun API Key（key- 开头）"
  remediation: "立即在 Mailgun 中轮换该 API Key，使用环境变量管理"

- name: "Heroku API Key"
  pattern: "(?:heroku|HEROKU).{0,20}[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}"
  severity: "HIGH"
  category: "API 密钥泄露"
  description: "发现疑似 Heroku API Key（UUID 格式，带 heroku 前缀上下文）"
  remediation: "立即在 Heroku Dashboard 中轮换该 API Key，使用环境变量管理"

- name: "通用 Private Key (PEM)"
  pattern: "-----BEGIN\\s+(?:EC\\s+|DSA\\s+|OPENSSH\\s+)?PRIVATE\\s+KEY-----"
  severity: "CRITICAL"
  category: "私钥泄露"
  description: "发现硬编码的 PEM 格式私钥（EC/DSA/OPENSSH 等）"
  remediation: "私钥不应存储在代码仓库中，请使用密钥管理服务或加密存储"

- name: "Docker Registry Auth"
  pattern: "\"auth\"\\s*:\\s*\"[A-Za-z0-9+/=]{20,}\""
  severity: "HIGH"
  category: "容器凭据泄露"
  description: "发现 Docker Registry 认证信息（Base64 编码凭据）"
  remediation: "不要将 Docker config.json 提交到代码仓库，使用 credential helper 管理"

- name: "NPM Token"
  pattern: "npm_[a-zA-Z0-9]{36}"
  severity: "HIGH"
  category: "包管理凭据泄露"
  description: "发现疑似 NPM 访问令牌"
  remediation: "立即在 npmjs.com 中撤销该 Token，使用环境变量或 .npmrc（加入 .gitignore）管理"

- name: "PyPI Token"
  pattern: "pypi-[A-Za-z0-9_-]{50,}"
  severity: "HIGH"
  category: "包管理凭据泄露"
  description: "发现疑似 PyPI API Token"
  remediation: "立即在 pypi.org 中撤销该 Token，使用环境变量管理"

- name: "Alibaba Cloud AccessKey"
  pattern: "LTAI[a-zA-Z0-9]{12,20}"
  severity: "HIGH"
  category: "云平台密钥泄露"
  description: "发现疑似阿里云 AccessKey ID（LTAI 开头）"
  remediation: "立即在阿里云控制台中轮换该 AccessKey，使用 RAM 角色或密钥管理服务替代"

- name: "Tencent Cloud SecretId"
  pattern: "AKID[a-zA-Z0-9]{13,20}"
  severity: "HIGH"
  category: "云平台密钥泄露"
  description: "发现疑似腾讯云 SecretId（AKID 开头）"
  remediation: "立即在腾讯云控制台中轮换该密钥，使用 CAM 角色或密钥管理服务替代"
